<!-- MSAL — loaded dynamically to guarantee it's ready before app starts -->
<script>
window.__msalReady = new Promise(function(resolve, reject){
  function tryLoad(urls, idx){
    if(idx >= urls.length){ reject(new Error('All MSAL CDNs failed')); return; }
    var s = document.createElement('script');
    s.src = urls[idx];
    s.onload = function(){
      if(typeof msal !== 'undefined'){ resolve(); }
      else { tryLoad(urls, idx+1); }
    };
    s.onerror = function(){ tryLoad(urls, idx+1); };
    document.head.appendChild(s);
  }
  tryLoad([
    'https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js',
    'https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js',
    'https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js'
  ], 0);
});
</script>

<script>
const {
  useState,
  useEffect,
  useRef,
  useMemo,
  useCallback
} = React;

// ════════════════════════════════════════════════════════════════
// MICROSOFT GRAPH API — OneDrive Sync
// ════════════════════════════════════════════════════════════════
const CLIENT_ID = '5f29117c-b706-4fc6-8142-5d6f5e728741';
const REDIRECT = 'https://wissamrgad-cmd.github.io/dpm/';
const GRAPH = 'https://graph.microsoft.com/v1.0';
const DATA_FILE_DEFAULT = 'DPM-Data.json';
const ONEDRIVE_FOLDER_DEFAULT = 'DPM App';

// Dynamic path helpers — read from localStorage so they work before full app load
function cleanPath(p) {
  if(!p) return '';
  // Strip Windows full path prefix (C:\Users\...\OneDrive\ or similar)
  p = p.replace(/^[A-Za-z]:\\.*?OneDrive[^\\]*\\/i, '');
  p = p.replace(/^[A-Za-z]:\\.*?OneDrive[^/]*/i, '');
  // Convert backslashes to forward slashes
  p = p.replace(/\\/g, '/');
  // Remove leading/trailing slashes
  p = p.replace(/^\/+|\/+$/g, '');
  return p;
}
function getDataFolder()    { try{const s=JSON.parse(localStorage.getItem('dpm_paths')||'{}');return cleanPath(s.dataFolder)||ONEDRIVE_FOLDER_DEFAULT;}catch{return ONEDRIVE_FOLDER_DEFAULT;} }
function getDataFile()      { try{const s=JSON.parse(localStorage.getItem('dpm_paths')||'{}');return s.dataFile||DATA_FILE_DEFAULT;}catch{return DATA_FILE_DEFAULT;} }
function getProjectsFolder(){ try{const s=JSON.parse(localStorage.getItem('dpm_paths')||'{}');return cleanPath(s.projectsFolder)||ONEDRIVE_FOLDER_DEFAULT;}catch{return ONEDRIVE_FOLDER_DEFAULT;} }
function savePaths(dataFolder, dataFile, projectsFolder, localPath){ localStorage.setItem('dpm_paths',JSON.stringify({dataFolder,dataFile,projectsFolder,localPath})); }

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: 'https://login.microsoftonline.com/consumers',
    redirectUri: REDIRECT
  },
  cache: {
    cacheLocation: 'localStorage',
    storeAuthStateInCookie: false
  }
};
const LOGIN_SCOPES = ['Files.ReadWrite', 'User.Read'];
const loginScopes = {
  scopes: LOGIN_SCOPES
};
let msalInstance = null;
async function initMsal() {
  try {
    await window.__msalReady;
    if (typeof msal === 'undefined') throw new Error('MSAL not available after load');
    msalInstance = new msal.PublicClientApplication(msalConfig);
    return true;
  } catch (e) {
    console.error('MSAL init failed:', e.message);
    return false;
  }
}
async function getToken() {
  if (!msalInstance) throw new Error('Auth not available');
  const accounts = msalInstance.getAllAccounts();
  if (!accounts || !accounts.length) throw new Error('Not signed in');
  try {
    // Avoid spreading loginScopes — build request object explicitly
    const r = await msalInstance.acquireTokenSilent({
      scopes: LOGIN_SCOPES,
      account: accounts[0]
    });
    return r.accessToken;
  } catch (e) {
    const r = await msalInstance.acquireTokenPopup({
      scopes: LOGIN_SCOPES
    });
    return r.accessToken;
  }
}
async function graphRead() {
  const token = await getToken();
  // Build path — encode each segment separately, preserve slashes
  const folder = getDataFolder().split('/').map(p => encodeURIComponent(p.trim())).join('/');
  const file   = encodeURIComponent(getDataFile());
  const res = await fetch(`${GRAPH}/me/drive/root:/${folder}/${file}:/content`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(`Read failed: HTTP ${res.status} — check your folder path in Settings`);
  return res.json();
}
async function graphWrite(data) {
  const token = await getToken();
  const folder = getDataFolder().split('/').map(p => encodeURIComponent(p.trim())).join('/');
  const file   = encodeURIComponent(getDataFile());
  const res = await fetch(`${GRAPH}/me/drive/root:/${folder}/${file}:/content`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(data, null, 2)
  });
  if (!res.ok) throw new Error(`Write failed: HTTP ${res.status}`);
  return true;
}
async function graphGetFolderUrl(folderPath) {
  try {
    const token = await getToken();
    const encoded = folderPath.split('/').map(p => encodeURIComponent(p.trim())).join('/');
    const res = await fetch(`${GRAPH}/me/drive/root:/${encoded}`, {
      headers: {
        Authorization: `Bearer ${token}`
      }
    });
    if (!res.ok) return null;
    const d = await res.json();
    return d.webUrl || null;
  } catch (e) {
    return null;
  }
}
async function graphGetUserInfo() {
  const token = await getToken();
  const res = await fetch(`${GRAPH}/me`, {
    headers: {
      Authorization: `Bearer ${token}`
    }
  });
  if (!res.ok) return null;
  return res.json();
}

// ─── GRAPH API FOLDER CREATION ─────────────────────────────
// Create Folders button — for existing projects
function CreateFoldersBtn({project}) {
  const [status, setStatus] = React.useState('idle');
  const [errorMsg, setErrorMsg] = React.useState('');
  const create = async e => {
    e.stopPropagation();
    setStatus('creating');
    setErrorMsg('');
    try {
      await createProjectFoldersGraph(project);
      setStatus('done');
      setTimeout(() => setStatus('idle'), 6000);
    } catch(err) {
      console.error('Create folders error:', err.message);
      setErrorMsg(err.message);
      setStatus('error');
      setTimeout(() => { setStatus('idle'); setErrorMsg(''); }, 8000);
    }
  };
  const cfg = {
    idle:     {label:'📁 Create Folders', cls:'btn btn-g btn-sm', disabled:false},
    creating: {label:'⏳ Creating folders…', cls:'btn btn-g btn-sm', disabled:true},
    done:     {label:'✓ Created in DPM App folder!', cls:'btn btn-ok btn-sm', disabled:true},
    error:    {label:'✗ Failed — see details below', cls:'btn btn-danger btn-sm', disabled:false},
  };
  const c = cfg[status] || cfg.idle;
  return React.createElement(React.Fragment, null,
    React.createElement('button', {
      className: c.cls,
      onClick: create,
      disabled: c.disabled,
      title: 'Creates folder structure in OneDrive: DPM App / ' + project.code + ' — ' + project.name
    }, c.label),
    status === 'done' && React.createElement('div', {
      style:{fontSize:10.5,color:'#2e7d32',marginTop:4,marginBottom:4}
    }, 'Look in your OneDrive for folder: DPM App / ' + project.code + ' — ' + project.name),
    status === 'error' && React.createElement('div', {
      style:{fontSize:10.5,color:'#c62828',marginTop:4,marginBottom:4}
    }, errorMsg || 'Failed. Open DevTools (F12) → Console to see the error.')
  );
}

// Create a single folder using PUT — most reliable Graph API method
// Creates folder at the full path, works even if intermediate folders missing
async function graphMkDir(token, fullPath) {
  const parts = fullPath.split('/');
  const name = parts[parts.length - 1];
  const parentParts = parts.slice(0, -1);
  const encodedParent = parentParts.map(p => encodeURIComponent(p.trim())).join('/');
  const url = encodedParent
    ? `${GRAPH}/me/drive/root:/${encodedParent}:/children`
    : `${GRAPH}/me/drive/root/children`;
  const res = await fetch(url, {
    method: 'POST',
    headers: {Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
    body: JSON.stringify({name: name, folder: {}})
  });
  // 201=created, 200=ok, 409=already exists — all acceptable
  if (res.ok || res.status === 409) return;
  // nameAlreadyExists error is also fine
  const txt = await res.text().catch(() => '');
  if (txt.includes('nameAlreadyExists') || txt.includes('Name already exists')) return;
  throw new Error(`Cannot create "${name}": HTTP ${res.status} — ${txt.slice(0,100)}`);
}

async function createProjectFoldersGraph(project) {
  const token = await getToken();
  const base = getProjectsFolder().replace(/\/+$/, ''); // remove trailing slash
  const em = ' — ';
  const pf = project.code + em + project.name;
  const DNAMES = {
    ARC: 'ARC — Architectural',
    ID: 'ID — Interior Design',
    LS: 'LS — Landscape',
    AL: 'AL — Arch. Lighting'
  };

  // Build complete list of paths to create, parents always before children
  const paths = [
    base,
    `${base}/${pf}`,
    `${base}/${pf}/1-General`,
    `${base}/${pf}/1-General/Contract`,
    `${base}/${pf}/1-General/Site-Photos`,
    `${base}/${pf}/1-General/Requirements`,
    `${base}/${pf}/1-General/MOM`,
    `${base}/${pf}/1-General/Others`,
  ];

  for (const disc of (project.disciplines || [])) {
    const dn = DNAMES[disc] || disc;
    const dp = `${base}/${pf}/${dn}`;
    paths.push(
      dp,
      `${dp}/Concept Development`,
      `${dp}/Schematic Design`,
      `${dp}/Schematic Design/Zoning Analysis`,
      `${dp}/Schematic Design/Pre-Plans`,
      `${dp}/Schematic Design/3D Visuals`,
      `${dp}/Drawings`,
      `${dp}/Drawings/General`,
      `${dp}/Drawings/GA - Drawings`,
      `${dp}/Drawings/Elevations`,
      `${dp}/Drawings/Details`,
      `${dp}/Drawings/Schedules`,
      `${dp}/Specs`,
      `${dp}/BOQ`,
      `${dp}/3D Visuals`
    );
  }

  console.log('DPM: Creating', paths.length, 'folders for', project.code);
  let errors = 0;
  for (const path of paths) {
    try {
      await graphMkDir(token, path);
    } catch (e) {
      console.error('DPM folder failed:', e.message);
      errors++;
    }
  }

  if (errors > 0) {
    throw new Error(`${errors} folders failed to create. Check console for details.`);
  }
  console.log('DPM: All folders created for', project.code, 'in OneDrive:', base);
  return true;
}

// Open OneDrive folder in browser (works on mobile and desktop)
// Get local Windows path to OneDrive folder
function getLocalProjectsPath() {
  try {
    const s = JSON.parse(localStorage.getItem('dpm_paths') || '{}');
    return (s.localPath || '').trim().replace(/[/\\]+$/, '');
  } catch { return ''; }
}

async function openOneDriveFolder(project, settings, subPath) {
  const base = getProjectsFolder();
  const projectFolder = `${project.code} \u2014 ${project.name}`;
  const parts = [base, projectFolder, subPath].filter(Boolean);
  const fullPath = parts.join('/');
  const url = await graphGetFolderUrl(fullPath);
  if (!url) {
    alert('Folder not found in OneDrive. Create the project folders first.');
    return;
  }

  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const localBase = getLocalProjectsPath();

  if (isMobile) {
    // On mobile — OneDrive app intercepts onedrive.live.com links automatically
    window.open(url, '_blank');
    return;
  }

  if (localBase) {
    // If user set their local OneDrive path in Settings, construct a file:// link
    // that opens directly in Windows Explorer
    const localPath = [localBase, projectFolder, subPath].filter(Boolean).join('\\');
    const fileUrl = 'file:///' + localPath.replace(/\\/g, '/');
    window.open(fileUrl, '_blank');
    return;
  }

  // Fallback — open in OneDrive web (OneDrive desktop app may intercept this)
  window.open(url, '_blank');
}

.tab{padding:8px 12px;font-size:11px;font-weight:500;color:var(--mi);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.tab:hover{color:var(--ch);}.tab.on{color:var(--bk);border-bottom-color:var(--bk);font-weight:600;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:left;padding:7px 8px;font-size:8px;font-weight:600;letter-spacing:1.5px;color:var(--sl);border-bottom:1px solid var(--bd);text-transform:uppercase;background:var(--wm);}
.tbl td{padding:7px 8px;font-size:11px;color:var(--ch);border-bottom:1px solid var(--bg);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--wm);}
.tbl-cl tr{cursor:pointer;}
.drn{font-size:10px;font-weight:600;color:var(--ad);letter-spacing:.3px;}

/* FORM */
.fg{margin-bottom:12px;}
.fl{display:block;font-size:9.5px;font-weight:600;letter-spacing:1px;color:var(--mi);margin-bottom:4px;text-transform:uppercase;}
.fi{width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);font-family:var(--fb);font-size:12px;color:var(--bk);background:var(--wh);outline:none;transition:border-color .15s;}
.fi:focus{border-color:var(--ac);}
.fs{width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);font-family:var(--fb);font-size:12px;color:var(--bk);background:var(--wh);outline:none;cursor:pointer;}
.ft{width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:var(--r);font-family:var(--fb);font-size:12px;color:var(--bk);background:var(--wh);resize:vertical;min-height:60px;outline:none;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:600px){.fr,.fr3{grid-template-columns:1fr;}}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(26,24,24,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:12px;}
.modal{background:var(--wh);border-radius:var(--rl);box-shadow:var(--shl);width:100%;max-width:660px;max-height:92vh;overflow-y:auto;}
.modal-hd{padding:14px 18px;border-bottom:1px solid var(--bg);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--wh);z-index:1;}
.modal-hd h2{font-family:var(--fh);font-size:18px;font-weight:400;}
.modal-bd{padding:16px 18px;}
.modal-ft{padding:10px 18px;border-top:1px solid var(--bg);display:flex;justify-content:flex-end;gap:8px;background:var(--wm);border-radius:0 0 var(--rl) var(--rl);}
.xbtn{background:none;border:none;cursor:pointer;color:var(--mi);font-size:20px;line-height:1;}

/* DISCIPLINE */
.dh{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--rl) var(--rl) 0 0;color:white;flex-wrap:wrap;gap:8px;}
.dh-code{font-family:var(--fh);font-size:24px;}
.lg{border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:12px;}
.lgh{background:var(--ch);color:white;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
.lgh h4{font-size:11px;font-weight:500;}.lgh-r{display:flex;align-items:center;gap:8px;}

/* FILTER */
.fbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
.fchip{padding:3px 9px;border-radius:12px;font-size:9.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);color:var(--mi);transition:all .15s;}
.fchip:hover{border-color:var(--lt);color:var(--ch);}.fchip.on{border-color:var(--ch);background:var(--ch);color:white;}

/* TAGS */
.tag{font-size:8px;font-weight:600;letter-spacing:1px;padding:2px 6px;border-radius:2px;}
.t-arc{background:#3D3B3B;color:white;}.t-id{background:#9E9690;color:white;}.t-ls{background:#6B6763;color:white;}.t-al{background:#7A7876;color:white;}

/* INFO GRID */
.ig{display:grid;grid-template-columns:1fr 1fr;}
.iif{padding:8px 12px;border-bottom:1px solid var(--bg);}
.iif:nth-child(odd){border-right:1px solid var(--bg);}
.lbl{font-size:8px;font-weight:600;letter-spacing:1.5px;color:var(--sl);text-transform:uppercase;margin-bottom:3px;}
.val{font-size:12px;color:var(--ch);}

/* REVISION */
.rev-it{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.rev-dot{width:24px;height:24px;border-radius:50%;background:var(--ch);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;flex-shrink:0;}
.rev-dot.cur{background:var(--ac);}
.rev-cnt{flex:1;padding:5px 9px;background:var(--wm);border-radius:var(--r);border:1px solid var(--bd);}

/* TRANSMITTAL */
.trm{padding:16px;}
.trm-hd{border-bottom:3px solid var(--bk);padding-bottom:10px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:flex-start;}
.trm-title{font-family:var(--fh);font-size:18px;}

/* MISC */
.alert{padding:9px 12px;border-radius:var(--r);font-size:11.5px;margin-bottom:12px;}
.al-i{background:var(--bg);border:1px solid var(--bd);color:var(--ch);}
.al-ok{background:#e8f5e9;border:1px solid #c8e6c9;color:#2e7d32;}
.al-w{background:#fff3e0;border:1px solid #ffe0b2;color:#e65100;}
.bc-nav{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--sl);margin-bottom:6px;}
.bc-nav span{cursor:pointer;}.bc-nav span:hover{color:var(--ch);}
.set-sec{margin-bottom:20px;}
.set-sec>h3{font-family:var(--fh);font-size:15px;font-weight:400;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bg);}
.ver{font-size:8px;letter-spacing:1px;color:var(--ad);margin-top:2px;}
.arch-banner{background:#fff8f0;border:1px solid #ffe0b2;border-radius:var(--rl);padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.arch-banner p{font-size:11.5px;color:#bf360c;flex:1;line-height:1.55;}
.pc-archived{opacity:.5;filter:grayscale(.6);}
.disc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;}
.disc-opt{border:2px solid var(--bd);border-radius:var(--rl);padding:10px 12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;}
.disc-opt:hover{border-color:var(--lt);}.disc-opt.sel{border-color:var(--ch);background:var(--wm);}
.disc-opt-check{width:16px;height:16px;border:2px solid var(--bd);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.disc-opt.sel .disc-opt-check{background:var(--ch);border-color:var(--ch);}
.disc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.disc-opt-info h4{font-size:11.5px;font-weight:600;color:var(--bk);}
.disc-opt-info p{font-size:9.5px;color:var(--mi);margin-top:1px;}
.folder-tree{background:var(--wm);border:1px solid var(--bd);border-radius:var(--r);padding:10px 12px;font-size:10.5px;color:var(--ch);line-height:1.9;font-family:'Courier New',monospace;max-height:200px;overflow-y:auto;}
.code-box{background:var(--bk);border-radius:var(--rl);padding:14px 16px;margin-bottom:14px;}
