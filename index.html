// MICROSOFT GRAPH API — OneDrive Sync
// ════════════════════════════════════════════════════════════════
const CLIENT_ID   = '5f29117c-b706-4fc6-8142-5d6f5e728741';
const REDIRECT    = 'https://wissamrgad-cmd.github.io/dpm/';
const GRAPH       = 'https://graph.microsoft.com/v1.0';
const DATA_FILE   = 'DPM-Data.json';
const ONEDRIVE_FOLDER = 'DPM App'; // folder in OneDrive root

const msalConfig={
  auth:{clientId:CLIENT_ID,authority:'https://login.microsoftonline.com/consumers',redirectUri:REDIRECT},
  cache:{cacheLocation:'localStorage',storeAuthStateInCookie:false},
};
const loginScopes={scopes:['Files.ReadWrite','User.Read']};
let msalInstance=null;
try{ msalInstance=new msal.PublicClientApplication(msalConfig); }catch(e){ console.error('MSAL init failed:',e); }

async function getToken(){
  if(!msalInstance) throw new Error('Auth not available');
  const accounts=msalInstance.getAllAccounts();
  if(!accounts.length) throw new Error('Not signed in');
  try{
    const r=await msalInstance.acquireTokenSilent({...loginScopes,account:accounts[0]});
    return r.accessToken;
  }catch(e){
    const r=await msalInstance.acquireTokenPopup(loginScopes);
    return r.accessToken;
  }
}

async function graphRead(){
  const token=await getToken();
  const res=await fetch(`${GRAPH}/me/drive/root:/${ONEDRIVE_FOLDER}/${DATA_FILE}:/content`,{
    headers:{Authorization:`Bearer ${token}`}
  });
  if(res.status===404) return null;
  if(!res.ok) throw new Error(`Read failed: HTTP ${res.status}`);
  return res.json();
}

async function graphWrite(data){
  const token=await getToken();
  const res=await fetch(`${GRAPH}/me/drive/root:/${ONEDRIVE_FOLDER}/${DATA_FILE}:/content`,{
    method:'PUT',
    headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
    body:JSON.stringify(data,null,2),
  });
  if(!res.ok) throw new Error(`Write failed: HTTP ${res.status}`);
  return true;
}

async function graphGetFolderUrl(folderPath){
  try{
    const token=await getToken();
    const encoded=encodeURIComponent(folderPath);
    const res=await fetch(`${GRAPH}/me/drive/root:/${folderPath}`,{
      headers:{Authorization:`Bearer ${token}`}
    });
    if(!res.ok) return null;
    const d=await res.json();
    return d.webUrl||null;
  }catch(e){ return null; }
}

async function graphGetUserInfo(){
  const token=await getToken();
  const res=await fetch(`${GRAPH}/me`,{headers:{Authorization:`Bearer ${token}`}});
  if(!res.ok) return null;
  return res.json();
}

// Open OneDrive folder in browser (works on mobile and desktop)
async function openOneDriveFolder(project,settings,...parts){
  const base=ONEDRIVE_FOLDER;
  const projectFolder=`${project.code} \u2014 ${project.name}`;
  const fullPath=[base,projectFolder,...parts.filter(Boolean)].join('/');
  const url=await graphGetFolderUrl(fullPath);
  if(url) window.open(url,'_blank');
  else alert('Folder not found in OneDrive. Create the project folders first from the project page.');
}

};
function mkDiscData(discs,populate=true){const ts=Date.now();const r={};discs.forEach(k=>{r[k]={drawings:populate&&TPL[k]?TPL[k](ts):[],visuals:[],specs:[],boq:[],schedules:[]};});return r;}
const DEFAULT_SETTINGS={firmName:"Your Design Firm",firmTagline:"Excellence in Every Detail",firmLocation:"Doha, Qatar",firmEmail:"",firmPhone:"",firmWebsite:"",firmLogo:null,ownerInitials:"XX",copyright:`© ${new Date().getFullYear()} Your Design Firm. All rights reserved.`};
function genCode(projects,initials){const yr=String(new Date().getFullYear()).slice(-2);const codes=projects.map(p=>p.code||'').filter(c=>c.startsWith(yr));let max=0;codes.forEach(c=>{const m=c.match(/^(\d{2})(\d{2})/);if(m)max=Math.max(max,parseInt(m[2],10));});return`${yr}${String(max+1).padStart(2,'0')}-${(initials||'XX').toUpperCase().slice(0,4)}`;}
function calcP(phases){const v=Object.values(phases);return Math.round(v.reduce((a,b)=>a+b,0)/v.length);}
function nRev(r){if(r==="-"||!r)return"A";return String.fromCharCode(r.charCodeAt(0)+1);}

// ─── FOLDER BUTTON ────────────────────────────────────────────
function FolderBtn({project,settings,...pathParts}){
  const[loading,sLoading]=useState(false);
  const open=async e=>{
    e.stopPropagation();
    sLoading(true);
    await openOneDriveFolder(project,settings,...pathParts);
    sLoading(false);
  };
  return(
    <button className="btn btn-g btn-sm" onClick={open} title="Open in OneDrive" style={{gap:4}}>
      📁 {loading?'Opening…':'OneDrive'}
    </button>
  );
}

// ─── DISC SELECTOR ────────────────────────────────────────────
function DiscSelector({selected,onChange,label="Disciplines in scope"}){
  const tog=d=>onChange(selected.includes(d)?selected.filter(x=>x!==d):[...selected,d]);
  return(
    <div className="fg">
      <label className="fl">{label}</label>
      <div className="disc-grid">
        {DISC_ALL.map(d=>(
          <div key={d} className={`disc-opt${selected.includes(d)?' sel':''}`} onClick={()=>tog(d)}>
            <div className="disc-opt-check">{selected.includes(d)&&<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3.5"><polyline points="20 6 9 17 4 12"/></svg>}</div>
            <div className="disc-dot" style={{background:DC[d]}}/>
            <div className="disc-opt-info"><h4>{d}</h4><p>{DN[d]}</p></div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AddDiscModal({project,onClose,onSave}){
  const existing=project.disciplines||[];
  const available=DISC_ALL.filter(d=>!existing.includes(d));

  if(!available.length)return<Modal title="Add Discipline" onClose={onClose}><div className="alert al-i">All disciplines are already active.</div></Modal>;
  const save=()=>{if(!sel.length)return;const newLod=mkDiscData(sel,true);onSave({...project,disciplines:[...existing,...sel],lod:{...project.lod,...newLod}});onClose();};
  return(<Modal title="Add Discipline" onClose={onClose} footer={<><button className="btn btn-g" onClick={onClose}>Cancel</button><button className={`btn ${sel.length?'btn-ok':'btn-g'}`} onClick={save} disabled={!sel.length}>Add Discipline</button></>}><p style={{fontSize:12,color:'var(--mi)',marginBottom:12}}>Select disciplines to add to <strong>{project.name}</strong>.</p><DiscSelector selected={sel} onChange={sSel} label="Disciplines to add"/></Modal>);
}

// ─── DISCIPLINE VIEW ──────────────────────────────────────────
function DiscView({project,disc,onUpdate,settings}){
  const[sub,sSub]=useState('lod');

  const[showTrans,sTrans]=useState(false);
  const[selDrw,sSel]=useState(null);
  const[filter,sFilter]=useState('all');
  const dd=project.lod[disc]||{drawings:[],visuals:[],specs:[],boq:[],schedules:[]};
  const drws=dd.drawings||[];
  const filtDrws=filter==='all'?drws:drws.filter(d=>d.status===filter);
  const updD=nd=>onUpdate({...project,lod:{...project.lod,[disc]:{...dd,...nd}}});
  const addDrw=d=>updD({drawings:[...drws,d]});
  const addRev=(id,rv)=>{const nl=drws.map(d=>d.id===id?{...d,rev:rv.rev,status:rv.status,issueDate:rv.date,revisions:[...d.revisions,{rev:rv.rev,date:rv.date,by:rv.by,comment:rv.comment}]}:d);updD({drawings:nl});sSel(s=>s?{...s,...nl.find(d=>d.id===s.id)}:null);};
  const chgStat=(id,st)=>{const nl=drws.map(d=>d.id===id?{...d,status:st}:d);updD({drawings:nl});sSel(s=>s?{...s,status:st}:null);};
  const addTrans=t=>onUpdate({...project,transmittals:[...(project.transmittals||[]),t]});
  const chgItem=(type,id,st)=>updD({[type]:(dd[type]||[]).map(x=>x.id===id?{...x,status:st}:x)});
  const delItem=(type,id)=>updD({[type]:(dd[type]||[]).filter(x=>x.id!==id)});
  const approved=drws.filter(d=>d.status==='approved').length;

  return(<div>
    {showAdd&&<AddDrwModal disc={disc} onClose={()=>sAdd(false)} onSave={addDrw}/>}

      <div><div style={{fontWeight:500,fontSize:13}}>{DN[disc]}</div><div style={{fontSize:10,opacity:.75,marginTop:1}}>{drws.length} drawings · {approved} approved · {pct}%</div></div>
      <div style={{marginLeft:'auto',display:'flex',gap:5,flexWrap:'wrap'}}>
        <FolderBtn project={project} settings={settings}/>
        <button className="btn btn-g btn-sm" style={{color:'white',borderColor:'rgba(255,255,255,.3)'}} onClick={()=>sTrans(true)}><Icon n="snd" sz={10}/> Transmittal</button>
        <button className="btn btn-g btn-sm" style={{color:'white',borderColor:'rgba(255,255,255,.3)'}} onClick={()=>sAdd(true)}><Icon n="plus" sz={10}/> Add Drawing</button>
      </div>
    </div>
    <div style={{background:'var(--wh)',border:'1px solid var(--bd)',borderTop:'none',borderRadius:'0 0 var(--rl) var(--rl)',marginBottom:14}}>
      <div className="tabs" style={{padding:'0 12px',marginBottom:0,borderBottom:'1px solid var(--bg)'}}>{STABS.map(t=><div key={t} className={`tab${sub===t?' on':''}`} onClick={()=>sSub(t)}>{SLBL[t]}</div>)}</div>
      <div style={{padding:12}}>
        {sub==='lod'&&(<div>
          <div className="fbar"><span style={{fontSize:9,color:'var(--sl)',fontWeight:600,letterSpacing:1,marginRight:3}}>FILTER:</span>{[{k:'all',l:`All (${drws.length})`},...SO.map(s=>({k:s,l:`${SM[s].label} (${drws.filter(d=>d.status===s).length})`}))].map(({k,l})=><span key={k} className={`fchip${filter===k?' on':''}`} onClick={()=>sFilter(k)}>{l}</span>)}</div>
          {filtDrws.length===0?<div style={{textAlign:'center',padding:24,color:'var(--sl)'}}>No drawings match filter</div>:(()=>{const fg={};filtDrws.forEach(d=>{if(!fg[d.group])fg[d.group]=[];fg[d.group].push(d);});return Object.entries(fg).map(([grp,ds])=><div key={grp} className="lg"><div className="lgh"><h4>{GRP[grp]||grp}</h4><div className="lgh-r"><span style={{fontSize:9}}>{ds.filter(d=>d.status==='approved').length}/{ds.length}</span><button style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.25)',color:'white',padding:'2px 7px',borderRadius:3,fontSize:9.5,cursor:'pointer'}} onClick={e=>{e.stopPropagation();openOneDriveFolder(project,settings,DISC_NAMES_FULL[disc],GROUP_FOLDER[grp]||'');}} title="Open folder">📁</button></div></div><table className="tbl tbl-cl"><thead><tr><th>Drawing No.</th><th>Title</th><th>Rev</th><th>Status</th><th>Issued</th></tr></thead><tbody>{ds.map(d=><tr key={d.id} onClick={()=>sSel(d)}><td><span className="drn">{d.num}</span></td><td style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{d.title}</td><td style={{fontWeight:600}}>{d.rev}</td><td><Badge s={d.status}/></td><td style={{fontSize:10,color:'var(--sl)'}}>{d.issueDate}</td></tr>)}</tbody></table></div>);})()}
        </div>)}
        {['visuals','specs','boq','schedules'].includes(sub)&&(<div>
          <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}><button className="btn btn-p btn-sm" onClick={()=>{const t=prompt('Item title:');if(t)updD({[sub]:[...(dd[sub]||[]),{id:'i'+Date.now(),title:t,status:'not-started',rev:'-',date:'-',assignee:'-',notes:''}]});}}><Icon n="plus" sz={10}/> Add</button></div>
          {(dd[sub]||[]).length===0?<div style={{textAlign:'center',padding:'20px',color:'var(--sl)',fontSize:12}}>No items yet</div>:<table className="tbl"><thead><tr><th>Title</th><th>Status</th><th></th></tr></thead><tbody>{(dd[sub]||[]).map(it=><tr key={it.id}><td style={{fontWeight:500}}>{it.title}</td><td><select style={{border:'none',background:'transparent',fontFamily:'var(--fb)',fontSize:11,cursor:'pointer'}} value={it.status} onChange={e=>chgItem(sub,it.id,e.target.value)}>{SO.map(s=><option key={s} value={s}>{SM[s].label}</option>)}</select></td><td><button className="btn btn-g btn-xs" onClick={()=>delItem(sub,it.id)}><Icon n="trash" sz={11}/></button></td></tr>)}</tbody></table>}
        </div>)}
        {sub==='transmittals'&&(<div>
          {(project.transmittals||[]).length===0?<div style={{textAlign:'center',padding:24,color:'var(--sl)'}}><div style={{fontSize:28,marginBottom:6}}>📨</div>No transmittals yet<br/><button className="btn btn-p btn-sm" style={{marginTop:10}} onClick={()=>sTrans(true)}>Generate Transmittal</button></div>:(project.transmittals||[]).map(t=>{const twgs=Object.values(project.lod).flatMap(d=>(d.drawings||[])).filter(d=>t.drawings.includes(d.id));return(<div key={t.id} className="card" style={{marginBottom:10}}><div className="trm"><div className="trm-hd"><div><div className="trm-title">Drawing Transmittal</div><div style={{fontSize:9,color:'var(--mi)',marginTop:2}}>{t.ref} · {t.date}</div></div><div style={{textAlign:'right'}}><div className="lbl">To</div><div style={{fontWeight:600}}>{t.to}</div><div style={{fontSize:11,color:'var(--mi)'}}>{t.purpose}</div></div></div><table className="tbl"><thead><tr><th>#</th><th>Drawing No.</th><th>Title</th><th>Rev</th><th>Status</th></tr></thead><tbody>{twgs.map((d,i)=><tr key={d.id}><td style={{color:'var(--sl)'}}>{i+1}</td><td><span className="drn">{d.num}</span></td><td>{d.title}</td><td style={{fontWeight:600}}>{d.rev}</td><td><Badge s={d.status}/></td></tr>)}</tbody></table>{t.notes&&<div style={{fontSize:11,color:'var(--mi)',fontStyle:'italic',paddingTop:7,borderTop:'1px solid var(--bg)',marginTop:6}}>{t.notes}</div>}</div></div>);})}</div>)}
      </div>
    </div>
  </div>);
}

// ERROR BOUNDARY
// ═══════════════════════════════════════════════════════════════
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  componentDidCatch(e,info){console.error('DPM Error:',e,info);}
  render(){if(!this.state.hasError)return this.props.children;return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#F5F3F0',fontFamily:"'Jost',sans-serif"}}><div style={{background:'white',border:'1px solid #D4CFC9',borderRadius:8,padding:32,maxWidth:440,textAlign:'center'}}><div style={{fontSize:32,marginBottom:10}}>⚠️</div><div style={{fontFamily:'Georgia,serif',fontSize:20,marginBottom:8}}>Something went wrong</div><p style={{fontSize:12,color:'#7A7876',marginBottom:16,lineHeight:1.7}}>Your data is safe. Click reload to continue.</p><div style={{background:'#FFF3E0',border:'1px solid #FFE0B2',borderRadius:4,padding:'8px 12px',fontSize:11,color:'#E65100',marginBottom:16,textAlign:'left'}}>{this.state.error?.message||'Unknown error'}</div><button onClick={()=>window.location.reload()} style={{background:'#1A1818',color:'white',border:'none',padding:'12px 24px',borderRadius:4,fontSize:13,cursor:'pointer',width:'100%'}}>↺ Reload DPM</button></div></div>);}
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App(){
  const[authState,sAuthState]=useState('checking'); // checking|signed-out|signed-in
  const[authError,sAuthError]=useState(null);
  const[userInfo,sUserInfo]=useState(null);
  const[projects,sProjects]=useState([]);
  const[settings,sSettings]=useState(DEFAULT_SETTINGS);
  const[saveStatus,sSaveStatus]=useState('idle');
  const[view,sView]=useState('dashboard');
  const[projId,sProjId]=useState(null);
  const[showNew,sNew]=useState(false);
  const[search,sSearch]=useState('');
  const[installPrompt,sInstallPrompt]=useState(()=>window.__dpmInstallEvt||null);
  const[showInstallBanner,sInstallBanner]=useState(()=>!!window.__dpmInstallEvt);
  const saveTimer=useRef(null);
  const isFirst=useRef(true);

  // Wire install prompt
  useEffect(()=>{
    window.__dpmOnInstallReady=e=>{sInstallPrompt(e);sInstallBanner(true);};
    window.__dpmOnInstalled=()=>{sInstallBanner(false);};
    if(window.__dpmInstallEvt){sInstallPrompt(window.__dpmInstallEvt);sInstallBanner(true);}
    return()=>{window.__dpmOnInstallReady=null;window.__dpmOnInstalled=null;};
  },[]);

  const doInstall=async()=>{if(!installPrompt)return;installPrompt.prompt();const{outcome}=await installPrompt.userChoice;if(outcome==='accepted'){sInstallBanner(false);sInstallPrompt(null);}};

  // Check auth on load
  useEffect(()=>{(async()=>{
    if(!msalInstance){sAuthState('signed-out');return;}
    try{
      await msalInstance.handleRedirectPromise();
      const accounts=msalInstance.getAllAccounts();
      if(accounts.length){
        sAuthState('signed-in');
        loadData();
        graphGetUserInfo().then(info=>{if(info)sUserInfo(info);}).catch(()=>{});
      }else{
        sAuthState('signed-out');
      }
    }catch(e){console.error('Auth check failed:',e);sAuthState('signed-out');}
  })();},[]);

  const signIn=async()=>{
    sAuthState('checking');sAuthError(null);
    try{
      const result=await msalInstance.loginPopup(loginScopes);
      if(result){sAuthState('signed-in');loadData();graphGetUserInfo().then(info=>{if(info)sUserInfo(info);}).catch(()=>{});}
    }catch(e){
      if(e.errorCode!=='user_cancelled'){sAuthError('Sign in failed: '+e.message);}
      sAuthState('signed-out');
    }
  };
  const signOut=async()=>{
    if(!confirm('Sign out of DPM?'))return;
    try{await msalInstance.logoutPopup();}catch(e){}
    sAuthState('signed-out');sProjects([]);sUserInfo(null);sView('dashboard');
  };

  const loadData=async()=>{
    sSaveStatus('syncing');
    try{
      const data=await graphRead();
      if(data){
        sProjects(data.projects||[]);
        sSettings({...DEFAULT_SETTINGS,...(data.settings||{})});
      }
      sSaveStatus('saved');setTimeout(()=>sSaveStatus('idle'),2000);
    }catch(e){
      console.warn('Load failed:',e.message);
      sSaveStatus('error');setTimeout(()=>sSaveStatus('idle'),3000);
    }
    isFirst.current=false;
  };

  // Auto-save on data change
  useEffect(()=>{
    if(isFirst.current||authState!=='signed-in')return;
    sSaveStatus('saving');
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      try{
        await graphWrite({projects,settings,lastSaved:new Date().toISOString(),version:APP_VERSION});
        sSaveStatus('saved');setTimeout(()=>sSaveStatus('idle'),2500);
      }catch(e){
        console.error('Save failed:',e.message);
        sSaveStatus('error');setTimeout(()=>sSaveStatus('idle'),4000);
      }
    },1800);
  },[projects,settings]);

  const updProj=u=>sProjects(ps=>ps.map(p=>p.id===u.id?u:p));
  const activeProj=projects.find(p=>p.id===projId);
  const activeProjects=projects.filter(p=>p.status!=='archived');
  const filtered=activeProjects.filter(p=>!search||[p.name,p.code,p.client].some(s=>s.toLowerCase().includes(search.toLowerCase())));
  const nav=[{id:'dashboard',l:'Dashboard',ic:'dash'},{id:'projects',l:'All Projects',ic:'proj'},{id:'archived',l:`Archived${projects.filter(p=>p.status==='archived').length?` (${projects.filter(p=>p.status==='archived').length})`:''}`,ic:'arch'},{id:'drawings',l:'Drawing Register',ic:'drw'},{id:'transmittals',l:'Transmittals',ic:'snd'},{id:'settings',l:'Settings',ic:'set'}];
  const title=view==='project'&&activeProj?activeProj.name:{dashboard:'Dashboard',projects:'All Projects',archived:'Archived',drawings:'Drawing Register',transmittals:'Transmittals',settings:'Settings'}[view]||'DPM';
  const saveLbl={saving:'Saving…',saved:'Synced ✓',error:'Sync failed',syncing:'Loading…'};
  const saveCls={saving:'ss-saving',saved:'ss-saved',error:'ss-error',syncing:'ss-syncing'};

  if(authState==='checking')return<><style>{CSS}</style><div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#1A1818',flexDirection:'column',gap:14}}><div style={{width:28,height:28,border:'2px solid #3D3B3B',borderTopColor:'#9E9690',borderRadius:'50%',animation:'spin .8s linear infinite'}}/><span style={{fontSize:11,letterSpacing:3,color:'#7A7876'}}>CONNECTING</span></div></>;
  if(authState==='signed-out')return<><style>{CSS}</style><SignInScreen onSignIn={signIn} loading={authState==='checking'} error={authError}/></>;

  return(<><style>{CSS}</style>
    {showNew&&<NewProjModal onClose={()=>sNew(false)} onSave={p=>{sProjects(ps=>[...ps,p]);sProjId(p.id);sView('project');}} projects={projects} settings={settings}/>}
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      {showInstallBanner&&<div style={{background:'var(--bk)',color:'white',padding:'8px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:11.5,flexShrink:0}}><span>📲 Install DPM as an app on this device</span><div style={{display:'flex',gap:7}}><button className="btn btn-a btn-sm" onClick={doInstall}>Install</button><button className="btn btn-g btn-sm" style={{color:'var(--sl)',borderColor:'var(--ch)'}} onClick={()=>sInstallBanner(false)}>Later</button></div></div>}
      <div className="app" style={{flex:1,minHeight:0}}>
        {/* SIDEBAR */}
        <div className="sb">
          <div className="sb-logo">
            {settings.firmLogo?<img src={settings.firmLogo} className="sb-logo-img" alt="logo"/>:<div className="sb-logo-box"><span className="sb-logo-txt">{settings.firmName?.split(' ').map(w=>w[0]).join('').slice(0,4)||'DPM'}</span></div>}
            <div className="sb-name">{settings.firmName||'Design Project Manager'}</div>
            {userInfo&&<div className="sb-user">👤 {userInfo.displayName||userInfo.mail||''}</div>}
            <div className="ver">v{APP_VERSION}</div>
          </div>
          <div className="nav">
            <div className="ns"><div className="nl">Navigation</div>{nav.map(n=><div key={n.id} className={`ni${view===n.id?' on':''}`} onClick={()=>{sView(n.id);sProjId(null);}}><Icon n={n.ic} sz={13}/>{n.l}</div>)}</div>
            <div className="ns"><div className="nl">Active Projects ({activeProjects.length})</div>{activeProjects.map(p=><div key={p.id} className={`ni${projId===p.id&&view==='project'?' on':''}`} onClick={()=>{sProjId(p.id);sView('project');}} style={{paddingLeft:9}}><div className="ni-dot" style={{background:calcP(p.phases)>80?'#3D3B3B':'#9E9690'}}/><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.code} — {p.name}</span></div>)}</div>
          </div>
          <div className="sb-ft"><p>{settings.firmLocation||'—'}</p><p style={{marginTop:2,fontSize:6.5,color:'#2A2828'}}>{settings.copyright||''}</p></div>
        </div>
        {/* MAIN */}
        <div className="main">
          <div className="topbar">
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {view==='project'&&<button style={{background:'none',border:'none',cursor:'pointer',color:'var(--mi)',display:'flex',alignItems:'center'}} onClick={()=>sView('dashboard')}><Icon n="back" sz={14}/></button>}
              <span className="tb-title">{title}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              {saveStatus!=='idle'&&<div className={`ss ${saveCls[saveStatus]}`}><Icon n="cloud" sz={10}/>{saveLbl[saveStatus]}</div>}
              {(view==='dashboard'||view==='projects'||view==='archived')&&<input style={{padding:'5px 9px',border:'1px solid var(--bd)',borderRadius:'var(--r)',fontFamily:'var(--fb)',fontSize:11,outline:'none',width:140}} placeholder="Search…" value={search} onChange={e=>sSearch(e.target.value)}/>}
              {view!=='settings'&&view!=='archived'&&<button className="btn btn-p btn-sm" onClick={()=>sNew(true)}><Icon n="plus" sz={10}/> New Project</button>}
            </div>
          </div>
          <div className="content">
            {view==='dashboard'&&<Dashboard projects={filtered} onOpen={id=>{sProjId(id);sView('project');}}/>}
            {view==='projects'&&<div className="g3">{filtered.map(p=>{const pct=calcP(p.phases);const drw=Object.values(p.lod||{}).flatMap(d=>d.drawings||[]);return(<div key={p.id} className="pc" onClick={()=>{sProjId(p.id);sView('project');}}><div className="pc-top" style={{background:'#9E9690'}}/><div className="pc-bd"><div className="pc-code">{p.code}</div><div className="pc-name">{p.name}</div><div className="pc-cl">{p.client}</div><div style={{height:1,background:'var(--bg)',margin:'8px 0'}}/>{[['Location',p.location],['Target',p.targetDate],['Contract',p.contractValue]].map(([k,v])=><div key={k} style={{display:'flex',justifyContent:'space-between',marginBottom:3}}><span style={{fontSize:10,color:'var(--sl)'}}>{k}</span><span style={{fontSize:10,fontWeight:500}}>{v||'—'}</span></div>)}<div className="pb-w" style={{marginTop:8}}><div className="pb" style={{width:pct+'%'}}/></div><div style={{display:'flex',justifyContent:'space-between',marginTop:4}}><div style={{display:'flex',gap:3}}>{(p.disciplines||[]).map(d=><span key={d} className={`tag t-${d.toLowerCase()}`}>{d}</span>)}</div><span style={{fontSize:10,fontWeight:600,color:'var(--mi)'}}>{pct}%</span></div></div></div>);})}</div>}
            {view==='archived'&&<ArchivedView projects={projects} onRestore={id=>updProj({...projects.find(p=>p.id===id),status:'active',archivedAt:null})} onOpen={id=>{sProjId(id);sView('project');}}/>}
            {view==='drawings'&&<GlobalDrawings projects={activeProjects}/>}
            {view==='transmittals'&&<GlobalTrans projects={activeProjects}/>}
            {view==='settings'&&<SettingsPage settings={settings} onSave={sSettings} userInfo={userInfo} onSignOut={signOut}/>}
            {view==='project'&&activeProj&&<ProjDetail project={activeProj} onBack={()=>sView('dashboard')} onUpdate={updProj} settings={settings}/>}
          </div>
        </div>
      </div>
    </div>
  </>);
}

window.addEventListener('load',()=>{
  document.getElementById('loading').style.display='none';
  document.getElementById('root').style.display='block';
  ReactDOM.createRoot(document.getElementById('root')).render(
    React.createElement(ErrorBoundary,null,React.createElement(App))
  );
});
</script>
</body>
</html>
